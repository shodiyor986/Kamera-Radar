<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maxsus Monitoring Paneli</title>
  <link rel="stylesheet" href="dez.css">
</head>
<body>

  <h2>TEZKOR QIDIRUV VA HAQIQIY MONITORING TIZIMI</h2>

  <div class="dashboard">
    <div class="panel">
      <h3>Radar Tizimi</h3>
      <div class="radar-box">
        <div class="radar-line" id="radar-sweep"></div>
      </div>
      <button class="btn" onclick="haqiqiyQidiruv()">Kameralarni Izlash</button>
      
      <h3>Topilgan Qurilmalar</h3>
      <div id="camera-list"><i>Izlash tugmasini bosing...</i></div>
    </div>

    <div class="panel">
      <h3>Jonli Tasvir: <span id="cam-title">Ulanmagan</span></h3>
      
      <div class="screen-wrapper">
        <div class="live-tag" id="live-indicator">● LIVE</div>
        <div class="overlay-msg" id="screen-text">Tizim faollashtirilishi kutilmoqda...</div>
        <video id="live-video" autoplay muted playsinline></video>
      </div>

      <div id="control-panel" style="margin-top: 15px; display: none;">
        <button class="btn btn-danger" onclick="shifrlashniOchish()">Shifrlashni Ochish (Test Mode)</button>
        <span id="decrypt-status"></span>
      </div>

      <h3>Fleshka (SD-Card) Yozuvlari [Test Rejimi]</h3>
      <div class="search-box">
        <input type="date" id="search-date" value="2026-07-08">
        <button class="btn" style="width: auto;" onclick="fleshkaniOqish()">O'qish</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Fayl nomi</th>
            <th>Vaqt</th>
            <th>Xavf darajasi</th>
          </tr>
        </thead>
        <tbody id="archive-body">
          <tr><td colspan="3" style="text-align: center; color: #4b5563;">Ma'lumot yo'q</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let tanlanganCamId = null;
    const videoElement = document.getElementById('live-video');
    const screenText = document.getElementById('screen-text');
    const BACKEND_URL = "http://localhost:3000"; // Node.js server manzili

    function haqiqiyQidiruv() {
      const sweep = document.getElementById('radar-sweep');
      const list = document.getElementById('camera-list');
      sweep.style.display = 'block';
      list.innerHTML = '<p style="color: #9ca3af;">Tarmoq skanerlanmoqda...</p>';

      fetch(`${BACKEND_URL}/api/radar-scan`)
        .then(res => res.json())
        .then(data => {
          sweep.style.display = 'none';
          list.innerHTML = '';
          data.devices.forEach(cam => {
            list.innerHTML += `
              <div class="cam-item" onclick="kameraniUlash('${cam.id}', '${cam.model}')">
                <strong>📡 ${cam.id}</strong><br>
                <small>${cam.model} (${cam.ip})</small>
              </div>`;
          });
        });
    }

    async function kameraniUlash(id, model) {
      tanlanganCamId = id;
      document.getElementById('cam-title').innerText = `${id} (${model})`;
      document.getElementById('control-panel').style.display = 'block';
      document.getElementById('decrypt-status').innerText = "";
      screenText.innerText = "Kamera oqimi faollashtirilmoqda...";

      try {
        // 1-Urinish: Jismoniy veb-kamerani tekshirish
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        videoElement.srcObject = stream;
        videoElement.style.display = 'block';
        screenText.style.display = 'none';
        document.getElementById('live-indicator').style.display = 'block';
      } catch (err) {
        // 2-Urinish: Agar jismoniy kamera topilmasa, Ekranni ulash (V360 Pro oynasi uchun)
        try {
          const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
          videoElement.srcObject = screenStream;
          videoElement.style.display = 'block';
          screenText.style.display = 'none';
          document.getElementById('live-indicator').style.display = 'block';
        } catch (e) {
          screenText.style.display = 'block';
          screenText.innerText = "Xatolik: Kamera yoki Ekran oqimi rad etildi.";
          videoElement.style.display = 'none';
        }
      }
    }

    function shifrlashniOchish() {
      if(!tanlanganCamId) return;
      document.getElementById('decrypt-status').innerText = "Shifr tahlil qilinmoqda...";
      
      fetch(`${BACKEND_URL}/api/decrypt`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cameraId: tanlanganCamId })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('decrypt-status').innerHTML = 
          `<span style="color: #ffaa00;">✔ PROTOKOL: ${data.algorithm}</span>`;
      });
    }

    function fleshkaniOqish() {
      if(!tanlanganCamId) return alert("Avval kamerani tanlang!");
      const sana = document.getElementById('search-date').value;
      const tbody = document.getElementById('archive-body');
      tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">O\'qilmoqda...</td></tr>';

      fetch(`${BACKEND_URL}/api/archive?cameraId=${tanlanganCamId}&sana=${sana}`)
        .then(res => res.json())
        .then(data => {
          tbody.innerHTML = '';
          if(data.videos.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #ff003c;">Video topilmadi.</td></tr>';
            return;
          }
          data.videos.forEach(v => {
            tbody.innerHTML += `
              <tr onclick="arxivIjro('${v.fayl}')">
                <td style="color:#00ff66;">💾 ${v.fayl}</td>
                <td>${v.vaqt}</td>
                <td><span style="color:#ffaa00;">${v.xavf}</span></td>
              </tr>`;
          });
        });
    }

    function arxivIjro(fayl) {
      document.getElementById('live-indicator').style.display = 'none';
      videoElement.style.display = 'none';
      screenText.style.display = 'block';
      screenText.innerHTML = `<span style="color:#ffaa00;">[PLAYBACK]</span><br>Fayl: ${fayl}`;
    }
  </script>
</body>
</html>
